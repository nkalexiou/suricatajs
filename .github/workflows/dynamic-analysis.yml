name: Dynamic analysis (DAST)

# Dastardly scans the publicly accessible surface only (no auth support).
# Authenticated endpoints require the paid Burp Suite DAST product.

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  dastardly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t suricatajs:dast .

      - name: Start app
        run: |
          docker run -d --name suricatajs \
            -e JWT_SECRET=ci-dummy-secret \
            -e API_KEYS=ci-key \
            -p 8085:8085 \
            suricatajs:dast

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8085/health && break
            sleep 2
          done

      - name: Dastardly scan
        uses: PortSwigger/dastardly-github-action@main
        with:
          target-url: http://localhost:8085

      - name: Stop app
        if: always()
        run: docker rm -f suricatajs

      - name: Publish results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Dastardly Results
          path: dastardly-report.xml
          reporter: java-junit
