version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: suricatajs
      POSTGRES_USER: suricatajs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suricatajs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suricatajs"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${API_PORT:-8085}:8085"
    environment:
      DATABASE_URL: postgresql://suricatajs:${POSTGRES_PASSWORD:-suricatajs}@db:5432/suricatajs
      API_KEYS: ${API_KEYS:-changeme}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8085"]

  runner:
    build: .
    environment:
      DATABASE_URL: postgresql://suricatajs:${POSTGRES_PASSWORD:-suricatajs}@db:5432/suricatajs
      SCAN_MODE: ${SCAN_MODE:-oneshot}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: ["python", "run.py"]

volumes:
  pgdata:
